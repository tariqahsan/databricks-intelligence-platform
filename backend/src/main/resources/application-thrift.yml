spring:
  config:
    activate:
      on-profile: thrift

  # Spark Thrift Server — same HiveServer2 protocol as Databricks SQL Warehouse.
  # Moving to AWS GovCloud = change this URL only. All SQL is identical.
  datasource:
    url: jdbc:hive2://localhost:10000/default
    driver-class-name: org.apache.hive.jdbc.HiveDriver
    username: ""
    password: ""
    hikari:
      pool-name: ThriftPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      # ── Hive does not support autoCommit=false or transactions ────
      # Without this, HikariCP sets autoCommit=false for every
      # connection (standard JDBC behavior), which Hive rejects with:
      #   "Request to set autoCommit to false; Hive does not support it"
      # Setting auto-commit=true keeps connections in the state Hive
      # expects and prevents the JDBC rollback errors on query failure.
      auto-commit: true

  # ── Disable Spring-managed transactions for Hive ─────────────────
  # Hive/Spark Thrift Server does not support JDBC transactions
  # (no BEGIN/COMMIT/ROLLBACK). Spring's @Transactional annotation
  # on repositories causes two problems:
  #   1. HikariCP tries to set autoCommit=false → Hive rejects it
  #   2. On any SQL error, Spring tries to rollback → Hive throws
  #      SQLFeatureNotSupportedException: Method not supported
  # Setting transaction-manager-beans to none tells Spring not to
  # wrap repository calls in transactions for this profile.
  # On AWS Databricks, transactions are also unsupported — this
  # setting carries forward unchanged.
  transaction:
    default-timeout: -1

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=60s

databricks:
  host: https://local-thrift-not-used
  token: not-used
  warehouse:
    id: thrift-local
  jobs:
    ingestion-pipeline-id: 9999

oe:
  datasource:
    gold-prefix: "gold"
    silver-prefix: "silver"

  # ── Netflow Visualization Configuration ──────────────────────────
  # Controls where NetworkFlowService looks for Python scripts and
  # CSV data files when generating the D3.js hop tree and Leaflet
  # ant-trail map via ProcessBuilder.
  #
  # python-cmd   : Python executable on the Jupyter container PATH.
  #                Use "python3" for Linux/Docker (default).
  #                Use "python"  if running Spring Boot locally on
  #                Windows pointing at a local Python install.
  #
  # scripts-dir  : Directory containing generate_hop_tree.py and
  #                generate_trail_map.py. In the Docker stack this
  #                is the Jupyter project root. When running Spring
  #                Boot locally on Windows, set this to the absolute
  #                Windows path where you checked out the scripts,
  #                e.g. C:/Dev/MMA-Training/.../oe-ingestion-pipeline
  #
  # data-dir     : Directory containing the Netflow CSV files.
  #                Must contain both dai-csv and meade-csv files.
  #
  # dai-csv      : Filename of the DAI flow CSV (do not include path).
  # meade-csv    : Filename of the DISA Meade flow CSV.
  #
  # coords-xlsx  : Path to master_dataframe_long.xlsx containing router
  #                and customer site coordinates (Router/Latitude/Longitude).
  #                Read once on first API call to /api/network-flows/coordinates
  #                and cached in memory for the lifetime of the process.
  #                Used by Angular trail map to draw ant-path routes.
  #
  # AWS GovCloud transition: only data-dir and coords-xlsx paths change
  # (S3 mount point or local download path). Script names and all other
  # keys are unchanged.
  network-flows:
    python-cmd:  python3
    scripts-dir: C:/Dev/MMA-Training/Artificial-Intelligence/databricks-intelligence-platform/oe-ingestion-pipeline
    data-dir:    C:/Dev/MMA-Training/Artificial-Intelligence/databricks-intelligence-platform/oe-ingestion-pipeline/mock-logs/network_flows
    dai-csv:     All_Complete_Flows_DAI.csv
    meade-csv:   All_Complete_Flows_DISA_Meade.csv
    coords-xlsx: C:/Dev/MMA-Training/Artificial-Intelligence/databricks-intelligence-platform/oe-ingestion-pipeline/master_dataframe_long.xlsx

logging:
  level:
    mil.disa.oe: DEBUG
    org.springframework.web: INFO
    org.apache.hive: WARN
    # Suppress the autoCommit warning — expected behavior with Hive
    com.zaxxer.hikari: WARN